name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        # Use npm install instead of npm ci to handle platform-specific optional
        # packages (e.g. @emnapi/runtime wasm32 bindings from unrs-resolver)
        # whose lockfile entries differ between macOS and Linux.
        run: npm install --prefer-offline

      - name: Build (OpenNext → Cloudflare)
        run: npm run cf:build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Deploy (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          NEXT_TELEMETRY_DISABLED: "1"
