name = "lunch-solution"
main = "worker/index.ts"
compatibility_date = "2025-06-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "lunch-db"
database_id = "60936f3e-5628-4d7e-a82e-95b06a281ebb"

[[kv_namespaces]]
binding = "CACHE"
id = "1a8dc17b416348d5992b53a050b968d4"

[[queues.producers]]
binding = "ORDER_QUEUE"
queue = "lunch-order-jobs"

[[queues.consumers]]
queue = "lunch-order-jobs"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "lunch-order-jobs-dlq"

# Custom domain only on production — branch builds use *.workers.dev preview URL
[env.production]
routes = [
  { pattern = "lunch.antu-technology.com", custom_domain = true }
]

[vars]
APP_URL = "https://lunch.antu-technology.com"
